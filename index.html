    <style>
        /* CSS Murni Klasik - Jauh Lebih Stabil & Anti-Gagal di HP */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f0f7ff;
            color: #1a202c;
            padding: 16px 16px 80px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container-mobile {
            max-width: 440px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        /* Efek Kaca Glassmorphism */
        .m3-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.02);
        }
        
        header { text-align: center; }
        header .badge-top {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: #0066ff;
            color: white;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        header h1 { font-size: 20px; font-weight: 800; color: #111827; }
        header p { font-size: 12px; color: #6b7280; font-weight: 600; margin-top: 2px; }
        
        /* Bottom Navbar Fixed Mobile Layout */
        .m3-navbar {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 32px); max-width: 408px; height: 64px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.8);
            border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            display: grid; grid-template-columns: 1fr 1fr; z-index: 999;
            padding: 4px;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 4px; color: #64748b; font-size: 11px; font-weight: 700;
            text-decoration: none; cursor: pointer; border-radius: 16px; transition: all 0.2s;
        }
        .nav-item i { font-size: 16px; }
        .nav-item.active {
            background: #e6f0ff; color: #0066ff;
        }
        
        .search-box { display: flex; flex-direction: column; gap: 12px; }
        .search-box h2 { font-size: 14px; font-weight: 800; color: #374151; }
        .search-box p { font-size: 11px; color: #6b7280; font-weight: 500; }
        .input-wrapper { position: relative; width: 100%; }
        .input-wrapper .icon-fa { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #9ca3af; }
        .input-wrapper input {
            width: 100%; padding: 12px 12px 12px 38px; border-radius: 16px;
            border: 1px solid #e5e7eb; background: rgba(255,255,255,0.9);
            font-size: 14px; font-weight: 600; outline: none;
        }
        .input-wrapper input:focus { border-color: #0066ff; background: #fff; }
        
        .btn-cari {
            width: 100%; padding: 14px; background: #0066ff; color: white;
            border: none; border-radius: 16px; font-size: 14px; font-weight: 800;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-cari:active { transform: scale(0.98); }
        
        /* Spinner Loader Area */
        .loading-area { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 0; gap: 10px; }
        .spinner {
            width: 36px; height: 36px; border: 4px solid rgba(0,102,255,0.15);
            border-top-color: #0066ff; border-radius: 50%; animation: putar 0.8s linear infinite;
        }
        @keyframes putar { to { transform: rotate(360deg); } }
        .loading-text { font-size: 12px; font-weight: 700; color: #0066ff; animation: denyut 1s ease-in-out infinite alternate; }
        @keyframes denyut { from { opacity: 0.5; } to { opacity: 1; } }
        
        /* Surprise Bounce Animation */
        @keyframes surprisePop {
            0% { transform: scale(0.4); opacity: 0; }
            50% { transform: scale(1.04); }
            70% { transform: scale(0.96); }
            100% { transform: scale(1); opacity: 1; }
        }
        .efek-surprise { animation: surprisePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards; }
        
        /* Stats Panel (Beranda) */
        .stats-panel { display: flex; flex-direction: column; gap: 16px; }
        .stats-title { font-size: 14px; font-weight: 800; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .stats-grid-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stats-card-mini { background: rgba(255,255,255,0.5); border: 1px solid white; border-radius: 16px; padding: 12px; text-align: center; }
        .stats-card-mini .label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .stats-card-mini .val { font-size: 20px; font-weight: 800; color: #0066ff; margin-top: 2px; }
        
        .chart-section { display: flex; flex-direction: column; gap: 8px; }
        .chart-section h4 { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; }
        .bar-container { display: flex; flex-direction: column; gap: 6px; background: rgba(255,255,255,0.4); padding: 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.5); }
        .bar-row { display: flex; align-items: center; gap: 8px; font-size: 10px; }
        .bar-label { width: 60px; font-weight: 700; color: #64748b; }
        .bar-track { flex-grow: 1; height: 12px; background: #e2e8f0; border-radius: 6px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; border-radius: 6px; }
        .fill-baik { background: #10b981; }
        .fill-memadai { background: #3b82f6; }
        .fill-kurang { background: #f59e0b; }
        .bar-count { width: 45px; text-align: right; font-weight: 800; color: #334155; }
        
        /* Hasil Kartu Peringkat Atas */
        .card-result { display: flex; flex-direction: column; gap: 16px; }
        @keyframes kilau { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-gold {
            background: linear-gradient(270deg, rgba(209, 250, 229, 0.65), rgba(167, 243, 208, 0.85), rgba(209, 250, 229, 0.65)) !important;
            background-size: 200% 200% !important; animation: kilau 4s ease infinite !important;
            border: 2px solid #34d399 !important; box-shadow: 0 0 14px rgba(52, 211, 153, 0.25) !important;
        }
        .glass-silver {
            background: linear-gradient(135deg, rgba(219, 234, 254, 0.75) 0%, rgba(191, 219, 254, 0.55) 100%) !important;
            border: 1px solid rgba(147, 197, 253, 0.5) !important;
        }
        .glass-bronze {
            background: linear-gradient(135deg, rgba(255, 237, 213, 0.8) 0%, rgba(253, 186, 116, 0.45) 100%) !important;
            border: 1px solid rgba(194, 65, 12, 0.35) !important;
        }
        
        .result-head { text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 12px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .result-head h3 { font-size: 15px; font-weight: 800; color: #111827; text-transform: uppercase; letter-spacing: -0.3px; }
        .result-head p { font-size: 10px; color: #9ca3af; font-weight: 700; }
        
        .rank-badge { font-size: 8px; font-weight: 800; padding: 3px 10px; border-radius: 99px; white-space: nowrap; display: flex; align-items: center; gap: 4px; width: fit-content; }
        .badge-gold { background: #059669; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .badge-silver { background: #2563eb; color: white; }
        .badge-bronze { background: #b45309; color: white; }
        .badge-normal { background: #f3f4f6; color: #4b5563; border: 1px solid #e5e7eb; }
        
        .result-body { display: flex; flex-direction: column; gap: 10px; }
        .score-box-item {
            background: rgba(255, 255, 255, 0.65); border: 1px solid white;
            padding: 12px 16px; border-radius: 18px; display: flex; 
            justify-content: space-between; align-items: center;
        }
        .score-box-left { display: flex; flex-direction: column; gap: 4px; align-items: flex-start; }
        .score-box-left .name { font-size: 11px; font-weight: 800; color: #6b7280; }
        .pred-badge { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 6px; }
        
        .p-baik { background: rgba(16, 185, 129, 0.1); color: #047857; border: 1px solid rgba(16, 185, 129, 0.2); }
        .p-memadai { background: rgba(59, 130, 246, 0.1); color: #1d4ed8; border: 1px solid rgba(59, 130, 246, 0.2); }
        .p-kurang { background: rgba(245, 158, 11, 0.1); color: #b45309; border: 1px solid rgba(245, 158, 11, 0.2); }
        
        .score-box-right { font-size: 22px; font-weight: 800; color: #111827; }
        .result-foot { background: rgba(59, 130, 246, 0.06); border: 1px solid rgba(59, 130, 246, 0.12); padding: 12px; border-radius: 14px; text-align: center; font-size: 11px; font-weight: 700; color: #1d4ed8; }
        .alert-error { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.15); color: #dc2626; padding: 14px; border-radius: 16px; text-align: center; font-size: 12px; font-weight: 700; }
        .hidden { display: none !important; }
    </style>
</head>
