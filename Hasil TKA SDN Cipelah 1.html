        /* Animasi kejutan muncul memantul */
        @keyframes joss {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }

                    <span>Periksa Nilai Kamu ✨</span>

        </div>

        <div id="loadingArea" class="hidden flex flex-col items-center justify-center py-10 space-y-3">

        ];

        function prosesCari() {
            const input = document.getElementById('nameInput').value.toUpperCase().trim();
            const resultArea = document.getElementById('resultArea');
            const loadingArea = document.getElementById('loadingArea');
            const btnCari = document.getElementById('btnCari');

            // Validasi jika input kurang dari 2 karakter
            if (input === "" || input.length < 2) {
                resultArea.innerHTML = `
                    <div class="bg-amber-50 border border-amber-200 text-amber-700 p-4 rounded-xl text-center text-sm font-semibold">
                        Ketik minimal 2 huruf untuk mulai mencari!
                    </div>
                `;
                return;
            }

            // Sembunyikan hasil lama, kunci tombol, dan tampilkan loading
            resultArea.innerHTML = "";
            loadingArea.classList.remove('hidden');
            btnCari.disabled = true;
            btnCari.classList.add('opacity-50');

            // Jeda dramatis (1.5 Detik) sebelum menampilkan hasil surprise
            setTimeout(() => {
                loadingArea.classList.add('hidden');
                btnCari.disabled = false;
                btnCari.classList.remove('opacity-50');
                
                // Cari data siswa berdasarkan kecocokan nama
                const hasilFilter = dataSiswa.filter(s => s.nama.includes(input));

                if (hasilFilter.length > 0) {
                    let htmlContent = "";
                    
                    hasilFilter.forEach(siswa => {
                        const badgeMtk = getBadgeClass(siswa.ketMtk);
                        const badgeBi = getBadgeClass(siswa.ketBing);

                        htmlContent += `
                            <div class="bg-white rounded-2xl shadow-xl border-2 border-blue-500 p-6 space-y-4 efek-surprise relative overflow-hidden">
                                <div class="absolute -top-6 -right-6 w-16 h-16 bg-yellow-400 rounded-full opacity-20 blur-sm"></div>
                                <div class="absolute -bottom-6 -left-6 w-14 h-14 bg-blue-400 rounded-full opacity-20 blur-sm"></div>
                                
                                <div class="border-b border-slate-100 pb-3 text-center">
                                    <span class="text-[10px] font-extrabold bg-amber-100 text-amber-800 px-3 py-1 rounded-full uppercase tracking-wider">✨ Data Ditemukan ✨</span>
                                    <h3 class="text-xl font-black text-slate-800 mt-3 tracking-tight">${siswa.nama}</h3>
                                    <p class="text-xs text-slate-400 font-semibold mt-0.5">NISN: ${siswa.nisn}</p>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="bg-gradient-to-b from-slate-50 to-slate-100/50 p-4 rounded-2xl border border-slate-100 text-center shadow-inner">
                                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Matematika</p>
                                        <p class="text-3xl font-black text-slate-800 my-1">${siswa.mtk}</p>
                                        <span class="inline-block text-[11px] font-extrabold px-2.5 py-0.5 rounded-full ${badgeMtk}">${siswa.ketMtk}</span>
                                    </div>
                                    <div class="bg-gradient-to-b from-slate-50 to-slate-100/50 p-4 rounded-2xl border border-slate-100 text-center shadow-inner">
                                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">B. Indonesia</p>
                                        <p class="text-3xl font-black text-slate-800 my-1">${siswa.bing}</p>
                                        <span class="inline-block text-[11px] font-extrabold px-2.5 py-0.5 rounded-full ${badgeBi}">${siswa.ketBing}</span>
                                    </div>
                                </div>
                                
                                <p class="text-xs text-center text-blue-600 font-bold italic pt-2 animate-bounce">
                                    🎉 Selamat yaa! Tingkatkan terus prestasimu! 🎉
                                </p>
                            </div>
                        `;
                    });
                    
                    resultArea.innerHTML = htmlContent;
                } else {
                    resultArea.innerHTML = `
                        <div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl text-center text-sm font-semibold efek-surprise">
                            Nama tidak ditemukan. Coba ketik nama panggilan lainnya ya!
                        </div>
                    `;
                }
            }, 1500);
        }

        function getBadgeClass(keterangan) {
            if (keterangan === "Baik") return "bg-green-100 text-green-700";
            if (keterangan === "Memadai") return "bg-blue-100 text-blue-700";
            return "bg-amber-100 text-amber-700";
        }
    </script>
